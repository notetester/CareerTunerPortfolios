<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 오케스트레이터 — 작업 과정 시안</title>
<style>
  :root{
    --bg:#08090a; --card:#141517; --card2:#1a1c1f; --border:#23252a;
    --ink:#f7f8f8; --muted:#8a8f98; --muted2:#62666d;
    --accent:#5e6ad2; --accent2:#7170ff; --halo:#a3a2ff;
    --ok:#3fb950; --skip:#6e7681; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 20px 80px}

  /* ===== 메인 홈 목업 ===== */
  .home{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}
  .side{width:210px;flex:none;border-right:1px solid var(--border);padding:18px 14px;background:#0e0f11}
  .side .logo{font-size:13px;font-weight:600;margin-bottom:18px;display:flex;gap:7px;align-items:center}
  .side .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent2)}
  .side .nav{display:flex;flex-direction:column;gap:3px}
  .side .nav a{font-size:12.5px;color:var(--muted);padding:7px 9px;border-radius:7px;text-decoration:none}
  .side .nav a.cur{background:var(--card2);color:var(--ink)}
  .main{flex:1;padding:24px;min-width:0}
  .main h2{font-size:18px;margin:0 0 4px;font-weight:600}
  .main .hi{font-size:12.5px;color:var(--muted);margin-bottom:20px}

  .embed{background:linear-gradient(135deg,rgba(94,106,210,.14),rgba(113,112,255,.05));
    border:1px solid #2c2f3d;border-radius:13px;padding:18px}
  .embed .t{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
  .embed .s{font-size:12.5px;color:var(--muted);margin:5px 0 14px}
  .embed .bar{display:flex;gap:9px}
  .embed input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;
    padding:11px 13px;color:var(--ink);font:inherit;font-size:13.5px;outline:0}
  .embed input:focus{border-color:#34384a}
  .embed .go{font-size:13.5px;font-weight:600;color:#fff;border:0;border-radius:9px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));padding:0 18px;white-space:nowrap}
  .embed .go:hover{filter:brightness(1.08)}
  .embed .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .chip{font-size:11.5px;color:var(--muted);background:var(--card2);border:1px solid var(--border);
    padding:5px 10px;border-radius:999px;cursor:pointer}
  .chip:hover{color:var(--ink)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
  .cards .c{background:#0e0f11;border:1px solid var(--border);border-radius:10px;padding:14px;height:72px}
  .cards .c .ct{font-size:12px;color:var(--muted)}
  .embed.drag{border-color:var(--accent2);background:linear-gradient(135deg,rgba(94,106,210,.24),rgba(113,112,255,.1))}
  .plan-tag{font-size:10.5px;font-weight:600;color:var(--halo);background:rgba(113,112,255,.14);
    border:1px solid rgba(113,112,255,.28);padding:3px 9px;border-radius:999px;cursor:pointer;margin-left:7px;vertical-align:middle}
  .plan-tag:hover{background:rgba(113,112,255,.22)}
  .bar .add{flex:none;width:42px;border:1px solid var(--border);background:var(--bg);color:var(--muted);
    border-radius:9px;font-size:16px;cursor:pointer}
  .bar .add:hover{color:var(--ink);border-color:#34384a}
  .files{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .files:empty{display:none}
  .file{display:flex;align-items:center;gap:7px;font-size:12px;background:var(--card2);
    border:1px solid var(--border);border-radius:8px;padding:6px 9px;color:var(--ink)}
  .file .fx{cursor:pointer;color:var(--muted2)}
  .file .fx:hover{color:var(--ink)}
  .lock{font-size:11.5px;color:var(--muted2);margin-top:10px}
  .lock b{color:var(--halo)}
  .drophint{display:none;font-size:12px;color:var(--halo);margin-top:11px;text-align:center;
    border:1px dashed rgba(113,112,255,.45);border-radius:9px;padding:11px}
  .embed.drag .drophint{display:block}

  /* ===== 팝업(모달) 오버레이 ===== */
  .dim{position:fixed;inset:0;background:rgba(2,3,4,.66);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:50}
  .dim.on{display:flex;animation:fade .2s ease}
  .modal{width:100%;max-width:760px;max-height:90vh;display:flex;flex-direction:column;
    background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,.6);animation:pop .25s cubic-bezier(.2,.8,.2,1)}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
  .mhead .ttl{font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px}
  .mhead .ttl .spark{font-size:15px}
  .mhead .st{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .mhead .x{appearance:none;border:0;background:transparent;color:var(--muted2);font-size:18px;cursor:pointer;padding:0 4px}
  .mbody{padding:8px 20px 18px;overflow-y:auto}
  .mfoot{border-top:1px solid var(--border);padding:14px 20px;display:none;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .mfoot.on{display:flex}
  .mfoot .fsub{font-size:12.5px;color:var(--muted)}
  .mfoot .fsub b{color:var(--ink)}
  .mfoot .go{font-size:13.5px;font-weight:600;color:#fff;border:0;border-radius:9px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));padding:10px 18px}

  /* 파트 그룹 헤더 */
  .pgroup{padding:14px 0 2px}
  .pgroup .ph{display:flex;align-items:center;gap:10px;margin-bottom:2px}
  .pgroup .ph .pname{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--ink)}
  .pgroup .ph .ptag{font-size:10.5px;color:var(--muted2)}
  .pgroup .ph .pstat{margin-left:auto;font-size:11px;font-weight:600}
  .pstat .run{color:var(--accent2)} .pstat .ok{color:var(--ok)} .pstat .sk{color:var(--skip)}

  /* 서브스텝 row (이미지 스타일) */
  .sub{display:flex;gap:13px;padding:9px 0 9px 2px;position:relative}
  .sub .rail{width:30px;flex:none;display:flex;flex-direction:column;align-items:center}
  .sub .ico{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:14px;
    background:rgba(113,112,255,.13);color:var(--halo);flex:none;transition:.2s}
  .sub.skip .ico{background:var(--card2);color:var(--muted2)}
  .sub .line{width:1.5px;flex:1;background:var(--border);margin-top:3px}
  .sub:last-child .line{display:none}
  .sub .body{flex:1;min-width:0;padding-top:2px}
  .sub .nm{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
  .sub .nm .t{font-size:11px;font-weight:400;color:var(--muted2)}
  .sub .ds{font-size:12px;color:var(--muted);margin-top:2px}
  .sub.skip .nm,.sub.skip .ds{color:var(--muted2)}
  .sub .det{margin-left:auto;font-size:11px;color:var(--muted2);cursor:pointer;white-space:nowrap;align-self:center}
  .sub .det:hover{color:var(--muted)}
  .spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent2);
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sub{animation:slidein .25s ease}
  @media(max-width:680px){.side{display:none}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="home">
    <div class="side">
      <div class="logo"><span class="dot"></span> CareerTuner</div>
      <div class="nav">
        <a class="cur" href="#">홈</a>
        <a href="#">지원 건</a>
        <a href="#">가상 면접</a>
        <a href="#">자소서</a>
        <a href="#">커뮤니티</a>
      </div>
    </div>
    <div class="main">
      <h2>안녕하세요 👋</h2>
      <div class="hi">한 줄이면 지원 한 건을 통째로 준비합니다.</div>

      <div class="embed" id="dropzone">
        <div class="t">⚡ AI 오케스트레이터 <span class="plan-tag" id="planTag" onclick="togglePlan()" title="요금제 미리보기 전환">무료 · 첨부 1개</span></div>
        <div class="s">회사·직무를 말하거나, 공고 캡처·PDF·자소서를 던져 넣으세요.</div>
        <div class="bar">
          <button class="add" onclick="pickFile()" title="파일 첨부">📎</button>
          <input id="q" value="네이버 백엔드 신입 지원 건 통째로 준비해줘" />
          <button class="go" onclick="openRun()">준비 시작</button>
        </div>
        <div class="files" id="files"></div>
        <div class="chips">
          <span class="chip" onclick="setQ('카카오 프론트 압박 면접까지')">카카오 · 압박</span>
          <span class="chip" onclick="setQ('토스 서버 직무 위주로')">토스 · 직무</span>
          <span class="chip" onclick="setQ('내 최근 지원 건 기본 면접')">최근 건 · 기본</span>
        </div>
        <div class="lock" id="lock"></div>
        <div class="drophint" id="drophint">📎 여기에 파일을 놓으세요</div>
      </div>
      <input type="file" id="fileInput" multiple style="display:none" onchange="onPick(event)" />

      <div class="cards">
        <div class="c"><div class="ct">진행 중인 지원 건</div></div>
        <div class="c"><div class="ct">최근 면접 리포트</div></div>
      </div>
    </div>
  </div>
</div>

<!-- 팝업 -->
<div class="dim" id="dim">
  <div class="modal">
    <div class="mhead">
      <div class="ttl"><span class="spark">✦</span> AI 오케스트레이터 작업 과정</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="st" id="mst"><span class="spinner"></span> 진행 중</div>
        <button class="x" onclick="closeRun()">✕</button>
      </div>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot" id="mfoot">
      <div class="fsub" id="fsub"></div>
      <button class="go" onclick="return false">▶ 면접 시작하기</button>
    </div>
  </div>
</div>

<script>
  // 각 파트가 내부적으로 도는 세부 작업(서브스텝). D 면접에만 있던 그림을 6파트 전체로.
  const PARTS = [
    {key:'PROFILE', name:'프로필·역량 정리', tag:'A', steps:[
      {ic:'📥', nm:'프로필 로드', t:'0.4초', ds:'보유 스펙·경력 불러오기'},
      {ic:'🧩', nm:'역량 추출', t:'1.2초', ds:'스킬 12개 정규화', det:true},
    ]},
    {key:'JOB', name:'공고 분석', tag:'B', steps:[
      {ic:'📄', nm:'공고 파싱', t:'0.8초', ds:'채용공고 본문 구조화'},
      {ic:'🗝️', nm:'핵심 요건 추출', t:'2.1초', ds:'필수·우대 요건 7개', det:true},
      {ic:'⚖️', nm:'키워드 가중', t:'0.6초', ds:'중요도 스코어링'},
    ]},
    {key:'FIT', name:'적합도 분석', tag:'C', steps:[
      {ic:'🔍', nm:'근거 검색', t:'2.7초', ds:'지식베이스 근거 주입'},
      {ic:'📋', nm:'채점', t:'3.1초', ds:'요건 매칭 점수화 → 원점수 81', det:true},
      {ic:'🛡️', nm:'검증', t:'1.4초', ds:'근거 가드 → 78점 확정', det:true},
    ]},
    {key:'WRITE', name:'자소서 교정', tag:'E', skip:true, steps:[
      {ic:'✍️', nm:'원문 확인', t:'0.1초', ds:'원문 미입력 — 교정 대기', skip:true},
    ]},
    {key:'INTERVIEW', name:'예상 면접 질문', tag:'D', steps:[
      {ic:'🔍', nm:'근거 검색', t:'1.0초', ds:'지식베이스 근거 주입'},
      {ic:'🎙️', nm:'질문 생성', t:'4.6초', ds:'예상 질문 8개 생성', det:true},
      {ic:'🪜', nm:'난이도 조정', t:'1.9초', ds:'직무 모드 가중 적용'},
      {ic:'↪', nm:'꼬리질문 준비', t:'0.5초', ds:'후속 검증 포인트 3개'},
    ]},
    {key:'COMMUNITY', name:'커뮤니티 큐레이션', tag:'F', steps:[
      {ic:'🔎', nm:'관련 글 검색', t:'0.6초', ds:'회사·직무 태그 매칭'},
      {ic:'⭐', nm:'인기순 정렬', t:'0.3초', ds:'후기 5개 선별'},
    ]},
  ];

  const delay = ms => new Promise(r=>setTimeout(r,ms));
  function setQ(t){ document.getElementById('q').value = t; }

  // ===== 파일 첨부 (무료 1개 / 프리미엄 여러 개 + 용량 게이팅) =====
  let plan='free'; const FILES=[];
  function planLimit(){ return plan==='free' ? {n:1,mb:5} : {n:5,mb:20}; }
  function renderPlan(){ const l=planLimit();
    document.getElementById('planTag').textContent=(plan==='free'?'무료':'프리미엄')+' · 첨부 '+l.n+'개·'+l.mb+'MB'; }
  function togglePlan(){ plan = plan==='free'?'pro':'free'; renderPlan(); renderFiles(); }
  function pickFile(){ document.getElementById('fileInput').click(); }
  function onPick(e){ addFiles(e.target.files); e.target.value=''; }
  function addFiles(list){ const l=planLimit();
    for(const f of list){ if(FILES.length>=l.n){ alert('지금 플랜은 첨부 '+l.n+'개까지. 더 넣으려면 프리미엄.'); break; } FILES.push(f); }
    renderFiles(); }
  function rmFile(i){ FILES.splice(i,1); renderFiles(); }
  function renderFiles(){ const l=planLimit(); while(FILES.length>l.n) FILES.pop();
    document.getElementById('files').innerHTML=FILES.map((f,i)=>{
      const ic=/pdf/i.test(f.name)?'📕':/png|jpe?g|gif|webp/i.test(f.name)?'🖼️':'📄';
      return '<span class="file">'+ic+' '+f.name+' <span class="fx" onclick="rmFile('+i+')">✕</span></span>'; }).join('');
    document.getElementById('lock').innerHTML = plan==='free'
      ? '🔒 무료는 첨부 1개·5MB. <b>프리미엄</b>이면 여러 개·20MB까지.'
      : '✨ 프리미엄 — 첨부 5개·20MB.'; }
  (function initDrop(){
    const dz=document.getElementById('dropzone');
    ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('drag');}));
    dz.addEventListener('dragleave',e=>{ if(!dz.contains(e.relatedTarget)) dz.classList.remove('drag'); });
    dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag'); addFiles(e.dataTransfer.files); });
    renderPlan(); renderFiles();
  })();

  async function openRun(){
    const dim = document.getElementById('dim');
    const body = document.getElementById('mbody');
    const foot = document.getElementById('mfoot');
    const mst = document.getElementById('mst');
    body.innerHTML = ''; foot.classList.remove('on');
    mst.innerHTML = '<span class="spinner"></span> 진행 중';
    dim.classList.add('on');

    let done=0, skip=0;
    for(const part of PARTS){
      const g = document.createElement('div');
      g.className = 'pgroup';
      g.innerHTML =
        '<div class="ph"><span class="pname">'+part.name+'</span>'+
        '<span class="ptag">·'+part.tag+'</span>'+
        '<span class="pstat" id="ps-'+part.key+'"><span class="run">진행</span></span></div>';
      body.appendChild(g);
      body.scrollTop = body.scrollHeight;

      for(const st of part.steps){
        const row = document.createElement('div');
        row.className = 'sub' + (st.skip?' skip':'');
        row.innerHTML =
          '<div class="rail"><div class="ico">'+(st.skip?'⤼':'<span class=\'spinner\'></span>')+'</div><div class="line"></div></div>'+
          '<div class="body"><div class="nm">'+st.nm+' <span class="t">'+(st.skip?'':'…')+'</span></div>'+
          '<div class="ds">'+st.ds+'</div></div>'+
          (st.det?'<div class="det">상세 ⌄</div>':'');
        g.appendChild(row);
        body.scrollTop = body.scrollHeight;
        if(!st.skip){
          await delay(420 + Math.min(parseFloat(st.t)*180, 900));
          row.querySelector('.ico').textContent = st.ic;
          row.querySelector('.nm .t').textContent = st.t;
        } else {
          await delay(300);
        }
      }
      const ps = document.getElementById('ps-'+part.key);
      if(part.skip){ ps.innerHTML='<span class="sk">⤼ 건너뜀</span>'; skip++; }
      else { ps.innerHTML='<span class="ok">✓ 완료</span>'; done++; }
    }

    mst.innerHTML = '<span style="color:var(--ok)">✓</span> 완료';
    document.getElementById('fsub').innerHTML =
      '<b>준비 완료</b> · 완료 '+done+' · 건너뜀 '+skip+' &nbsp;—&nbsp; 면접부터 시작하는 걸 추천';
    foot.classList.add('on');
  }
  function closeRun(){ document.getElementById('dim').classList.remove('on'); }
  document.getElementById('dim').addEventListener('click', e=>{ if(e.target.id==='dim') closeRun(); });
</script>
</body>
</html>
