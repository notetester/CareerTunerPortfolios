# CareerTuner Dependabot configuration.
#
# Dependency graph snapshot checked while writing this file:
# - npm: frontend/package.json + package-lock.json
# - Gradle: backend/build.gradle
# - pip: docs/ai-training and ml/* requirements files
# - Docker: docker-compose.yml, backend/Dockerfile, ml/job-posting-worker/Dockerfile
# - GitHub Actions: .github/workflows/*.yml
#
# Keep version-update noise low: app, ML, container, and workflow dependency
# updates are collected into one weekly Dependabot PR targeting dev.
version: 2

multi-ecosystem-groups:
  careertuner-dependencies:
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "Asia/Seoul"
    target-branch: "dev"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-dependencies"

  - package-ecosystem: "gradle"
    directory: "/backend"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-dependencies"

  - package-ecosystem: "pip"
    directories:
      - "/docs/ai-training"
      - "/ml/career-strategy-llm"
      - "/ml/interview-finetune"
      - "/ml/interview-nonverbal"
      - "/ml/job-posting-worker"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-dependencies"

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/backend"
      - "/ml/job-posting-worker"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-dependencies"
