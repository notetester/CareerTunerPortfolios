# CareerTuner dependency update policy.
#
# Repository shape:
# - frontend/: React/Vite/TypeScript/Capacitor npm app
# - backend/: Spring Boot 4 + Gradle API
# - ml/: Python model, evaluation, OCR, and worker experiments
# - Docker/GitHub Actions: demo, release, and worker automation
#
# Keep runtime updates reviewable as one weekly platform PR, while Python ML
# experiments are grouped separately because they can affect reproducibility.
version: 2

multi-ecosystem-groups:
  careertuner-runtime:
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "area/runtime"

updates:
  # Frontend web/PWA/mobile shell dependencies.
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "dev"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-runtime"
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"

  # Backend API dependencies: Spring Boot, MyBatis, security, JWT, OpenAPI, PDF, mail, push.
  - package-ecosystem: "gradle"
    directory: "/backend"
    target-branch: "dev"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-runtime"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"

  # Container base images for local compose, backend API, and job-posting worker.
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/backend"
      - "/ml/job-posting-worker"
    target-branch: "dev"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-runtime"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"

  # Demo deploy, mobile release, 4090 trigger, and CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    patterns: ["*"]
    multi-ecosystem-group: "careertuner-runtime"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"

  # Python ML, OCR, and offline evaluation requirements.
  - package-ecosystem: "pip"
    directories:
      - "/docs/ai-training"
      - "/ml/career-strategy-llm"
      - "/ml/interview-finetune"
      - "/ml/interview-nonverbal"
      - "/ml/job-posting-worker"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "05:00"
      timezone: "Asia/Seoul"
    target-branch: "dev"
    labels:
      - "dependencies"
      - "area/ml"
    commit-message:
      prefix: "deps(ml)"
      include: "scope"
    open-pull-requests-limit: 2
    groups:
      ml-python-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
      ml-python-major:
        patterns: ["*"]
        update-types:
          - "major"
    exclude-paths:
      - "**/.venv/**"
      - "**/venv/**"
      - "**/__pycache__/**"
      - "**/artifacts/**"
      - "**/outputs/**"
      - "**/models/**"
      - "**/data/**"
