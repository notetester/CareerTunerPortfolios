name: Release Android demo APK

# 태그를 푸시하면(v* 또는 demo-*) mock 데모 APK 를 빌드해 GitHub Release 에 자동 첨부한다.
# 팀원은 클론/빌드 없이 Releases 페이지에서 APK 를 받아 BlueStacks 에 드래그&드롭하면 된다.
#  - 디버그 서명(사이드로드용). 스토어 배포용 서명 아님.
#  - mock 모드 빌드라 백엔드 없이 자체 동작(로그인은 아무 값이나 통과).
#  - android/ 네이티브 프로젝트는 .gitignore 대상이라 러너에서 `npx cap add android` 로 재생성.
#  - 수동 실행(workflow_dispatch)은 워크플로가 기본 브랜치(main)에 머지된 뒤부터 버튼이 보인다.
#    태그 트리거는 머지 전에도 동작한다(태그가 가리키는 커밋에 이 파일이 있으면 됨).
on:
  push:
    tags:
      - 'v*'
      - 'demo-*'
      - 'live-*'   # live-* 태그 = 실서버(https://careertuner.kro.kr) 연동 APK
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (비우면 <모드>-r<실행번호> 자동 생성)'
        required: false
        default: ''
      mode:
        description: 'mock=자체 데모(백엔드 불필요) | live=실서버(careertuner.kro.kr) 연동'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - live

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Capacitor CLI 8 은 Node >= 22 필요
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK 36 packages
        # ubuntu 러너에 ANDROID_HOME 사전 설치됨. Capacitor 8 요구사항(compile/target 36)만 보강.
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0" > /dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Resolve build mode (mock | live)
        id: mode
        run: |
          MODE="${{ inputs.mode }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            case "${{ github.ref_name }}" in live-*) MODE=live ;; esac
          fi
          MODE="${MODE:-mock}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "빌드 모드: $MODE"

      - name: Build web (mock=자체데모 / live=실서버 연동)
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "live" ]; then
            npm run build:aws     # VITE_API_BASE_URL=https://careertuner.kro.kr/api (frontend/.env.aws)
          else
            npm run build:mock
          fi

      - name: Add Android platform (regenerated each run; android/ is gitignored)
        run: npx cap add android

      - name: Sync web assets + plugins
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode none

      - name: Resolve release tag and stage artifacts
        id: meta
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$MODE-r${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cp android/app/build/outputs/apk/debug/app-debug.apk "CareerTuner-$MODE-$TAG.apk"
          (cd dist && zip -qr "../CareerTuner-web-$MODE-$TAG.zip" .)
          ls -la CareerTuner-*

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CareerTuner ${{ steps.mode.outputs.mode }} ${{ steps.meta.outputs.tag }}
          prerelease: true
          files: |
            frontend/CareerTuner-*.apk
            frontend/CareerTuner-web-*.zip
          body: |
            ## CareerTuner ${{ steps.mode.outputs.mode }} 빌드

            | 파일 | 용도 |
            | --- | --- |
            | `CareerTuner-*.apk` | Android 앱 — 폰/BlueStacks 사이드로드 설치 |
            | `CareerTuner-web-*.zip` | 같은 빌드의 웹 번들(정적 호스팅용) |

            **모드 안내**
            - `mock`: 백엔드 불필요 자체 데모 — 아무 이메일/비밀번호로 데모 계정("김데모") 진입.
            - `live`: 실서버(https://careertuner.kro.kr) 연동 — 실제 계정으로 로그인, 웹과 데이터 공유.
            - 디버그 서명이므로 사이드로드 전용입니다(스토어 배포 불가).
