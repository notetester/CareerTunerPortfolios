name: Release Android demo APK

# 공개 포트폴리오에서는 release 파이프라인 설계와 계약 테스트만 보존한다.
# 실제 공개 산출물은 Pages 데모이며 이 참고 job은 항상 건너뛴다.

# 태그를 푸시하면(v* 또는 demo-*) 시연 전용 release 서명 APK를 빌드해 GitHub Release 에 자동 첨부한다.
# 팀원은 클론/빌드 없이 Releases 페이지에서 APK 를 받아 BlueStacks 에 드래그&드롭하면 된다.
#  - 시연 전용 release 서명(사이드로드/App Link 검증용). Play Store 최종 서명 키가 아님.
#  - mock 모드 빌드라 백엔드 없이 자체 동작(로그인은 아무 값이나 통과).
#  - android/ 네이티브 프로젝트는 repo에 포함되며, 없을 때만 러너에서 재생성.
#  - 수동 실행(workflow_dispatch)은 워크플로가 기본 브랜치(main)에 머지된 뒤부터 버튼이 보인다.
#    태그 트리거는 머지 전에도 동작한다(태그가 가리키는 커밋에 이 파일이 있으면 됨).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (비우면 <모드>-r<실행번호> 자동 생성)'
        required: false
        default: ''
      mode:
        description: 'mock=자체 데모(백엔드 불필요) | live=실서버(careertuner.example.com) 연동'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - live

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: ${{ false }}
    # GitHub-hosted 분량 소진과 무관하게 팀 self-hosted Linux runner에서 릴리스를 만든다.
    runs-on: [self-hosted, linux, x64, careertuner-ci]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Capacitor CLI 8 은 Node >= 22 필요
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        # setup-android가 legacy tools/bin 또는 cmdline-tools 중 어느 레이아웃을 설치해도 동작한다.
        run: |
          set -euo pipefail
          SDKMANAGER=$(command -v sdkmanager || true)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find "$ANDROID_HOME" -type f -name sdkmanager -perm -u+x 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "::error::Android sdkmanager를 찾지 못했습니다."
            exit 1
          fi
          "$SDKMANAGER" "platforms;android-36" "build-tools;35.0.0" > /dev/null

      - name: Install dependencies
        run: npm ci

      - name: Resolve build mode (mock | live)
        id: mode
        run: |
          MODE="${{ inputs.mode }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            case "${{ github.ref_name }}" in live-*) MODE=live ;; esac
          fi
          MODE="${MODE:-mock}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "빌드 모드: $MODE"

      - name: Configure demo release signing and verify App Link fingerprint
        id: signing
        env:
          ANDROID_DEMO_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEMO_KEYSTORE_BASE64 }}
          ANDROID_DEMO_STORE_PASSWORD: ${{ secrets.ANDROID_DEMO_STORE_PASSWORD }}
          ANDROID_DEMO_KEY_ALIAS: ${{ secrets.ANDROID_DEMO_KEY_ALIAS }}
          ANDROID_DEMO_KEY_PASSWORD: ${{ secrets.ANDROID_DEMO_KEY_PASSWORD }}
          ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS: ${{ vars.ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "$ANDROID_DEMO_KEYSTORE_BASE64" ] && missing="$missing ANDROID_DEMO_KEYSTORE_BASE64"
          [ -z "$ANDROID_DEMO_STORE_PASSWORD" ] && missing="$missing ANDROID_DEMO_STORE_PASSWORD"
          [ -z "$ANDROID_DEMO_KEY_ALIAS" ] && missing="$missing ANDROID_DEMO_KEY_ALIAS"
          [ -z "$ANDROID_DEMO_KEY_PASSWORD" ] && missing="$missing ANDROID_DEMO_KEY_PASSWORD"
          [ -z "$ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS" ] && missing="$missing ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS"
          if [ -n "$missing" ]; then
            echo "::error::시연 release 서명/App Link 설정 누락 →$missing"
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/careertuner-demo-release.jks"
          printf '%s' "$ANDROID_DEMO_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          ACTUAL_FINGERPRINT=$(keytool -exportcert \
            -alias "$ANDROID_DEMO_KEY_ALIAS" \
            -keystore "$KEYSTORE_PATH" \
            -storepass:env ANDROID_DEMO_STORE_PASSWORD \
            -rfc | openssl x509 -noout -fingerprint -sha256 | cut -d= -f2)
          ANDROID_SIGNING_SHA256_CERT_FINGERPRINT="$ACTUAL_FINGERPRINT" \
            node scripts/verify-app-link-signing.mjs
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$ACTUAL_FINGERPRINT" >> "$GITHUB_OUTPUT"

      - name: Verify deployed Asset Links before signing APK
        if: steps.mode.outputs.mode == 'live'
        env:
          ANDROID_SIGNING_SHA256_CERT_FINGERPRINT: ${{ steps.signing.outputs.fingerprint }}
          ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS: ${{ vars.ANDROID_APP_LINK_SHA256_CERT_FINGERPRINTS }}
          ANDROID_ASSETLINKS_FILE: ${{ runner.temp }}/assetlinks.json
        run: |
          curl -fsS --retry 5 --retry-delay 2 \
            https://careertuner.example.com/.well-known/assetlinks.json \
            -o "$ANDROID_ASSETLINKS_FILE"
          node scripts/verify-app-link-signing.mjs

      - name: Build web (mock=자체데모 / live=실서버 연동)
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "live" ]; then
            npm run build:aws     # VITE_API_BASE_URL=https://careertuner.example.com/api (frontend/.env.aws)
          else
            npm run build:mock
          fi

      - name: Add Android platform (repo에 android/ 가 커밋돼 있으면 그대로 사용)
        run: test -d android || npx cap add android

      - name: Sync web assets + plugins
        run: npm run native:sync -- android

      - name: Build demo release-signed APK
        env:
          CAREERTUNER_ANDROID_STOREFILE: ${{ steps.signing.outputs.keystore_path }}
          CAREERTUNER_ANDROID_STOREPASSWORD: ${{ secrets.ANDROID_DEMO_STORE_PASSWORD }}
          CAREERTUNER_ANDROID_KEYALIAS: ${{ secrets.ANDROID_DEMO_KEY_ALIAS }}
          CAREERTUNER_ANDROID_KEYPASSWORD: ${{ secrets.ANDROID_DEMO_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          # assemble만으로는 API 레벨별 styles.xml 속성 오류가 누락될 수 있다.
          ./gradlew lintRelease assembleRelease --no-daemon --warning-mode none

      - name: Verify packaged APK signature and security manifest
        env:
          EXPECTED_SIGNING_FINGERPRINT: ${{ steps.signing.outputs.fingerprint }}
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/release/app-release.apk"
          resolve_sdk_tool() {
            TOOL=$(command -v "$1" || true)
            if [ -z "$TOOL" ]; then
              TOOL=$(find "$ANDROID_HOME" -type f -name "$1" -perm -u+x 2>/dev/null | sort -V | tail -1)
            fi
            if [ -z "$TOOL" ]; then
              echo "::error::Android SDK 도구를 찾지 못했습니다: $1" >&2
              return 1
            fi
            echo "$TOOL"
          }
          APKSIGNER=$(resolve_sdk_tool apksigner)
          AAPT2=$(resolve_sdk_tool aapt2)
          APKANALYZER=$(resolve_sdk_tool apkanalyzer)
          test -f "$APK" || { echo "::error::release APK가 없습니다: $APK"; exit 1; }
          echo "Android SDK tools: apksigner=$APKSIGNER, aapt2=$AAPT2, apkanalyzer=$APKANALYZER"

          SIGNING_OUTPUT="$RUNNER_TEMP/apk-signing.txt"
          "$APKSIGNER" verify --verbose --print-certs "$APK" > "$SIGNING_OUTPUT"
          ACTUAL=$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$SIGNING_OUTPUT" | head -1 | tr '[:upper:]' '[:lower:]')
          EXPECTED=$(printf '%s' "$EXPECTED_SIGNING_FINGERPRINT" | tr -d ':' | tr '[:upper:]' '[:lower:]')
          [ -n "$ACTUAL" ] && [ "$ACTUAL" = "$EXPECTED" ] || {
            echo "::error::패키징된 APK 인증서 지문이 시연 release 키와 일치하지 않습니다."
            exit 1
          }

          MANIFEST_XML="$RUNNER_TEMP/apk-manifest.xml"
          "$APKANALYZER" manifest print "$APK" > "$MANIFEST_XML"
          require_fixed() {
            LABEL="$1"
            NEEDLE="$2"
            FILE="$3"
            grep -Fq "$NEEDLE" "$FILE" || {
              echo "::error::패키징 검증 실패($LABEL): $NEEDLE"
              return 1
            }
            echo "APK security check OK: $LABEL"
          }
          require_fixed allowBackup 'android:allowBackup="false"' "$MANIFEST_XML"
          require_fixed cleartext-manifest 'android:usesCleartextTraffic="false"' "$MANIFEST_XML"
          # apkanalyzer는 resource 이름 대신 @ref/0x...를 출력하므로 manifest에서는 속성 존재만 확인하고,
          # 실제 패키징된 XML 세 파일은 아래 aapt2 dump로 각각 검증한다.
          require_fixed networkSecurityConfig 'android:networkSecurityConfig=' "$MANIFEST_XML"
          require_fixed dataExtractionRules 'android:dataExtractionRules=' "$MANIFEST_XML"
          require_fixed fullBackupContent 'android:fullBackupContent=' "$MANIFEST_XML"

          RESOURCE_TABLE="$RUNNER_TEMP/apk-resources.txt"
          "$AAPT2" dump resources "$APK" > "$RESOURCE_TABLE"
          resolve_resource_file() {
            awk -v target="xml/$1" '
              $1 == "resource" && $3 == target { found=1; next }
              found && /\(file\)/ {
                for (i=1; i<=NF; i++) if ($i ~ /^res\/.*\.xml$/) { print $i; exit }
              }
              found && $1 == "resource" { exit 1 }
            ' "$RESOURCE_TABLE"
          }

          NETWORK_RESOURCE=$(resolve_resource_file network_security_config)
          test -n "$NETWORK_RESOURCE"
          NETWORK_XML="$RUNNER_TEMP/apk-network-security.txt"
          "$AAPT2" dump xmltree "$APK" --file "$NETWORK_RESOURCE" > "$NETWORK_XML"
          grep -Fq 'cleartextTrafficPermitted' "$NETWORK_XML"
          grep -Eq 'cleartextTrafficPermitted.*(0x0|false)' "$NETWORK_XML"
          if grep -Eq 'cleartextTrafficPermitted.*(0xffffffff|true)' "$NETWORK_XML"; then
            echo "::error::패키징된 network security 설정이 cleartext 통신을 허용합니다."
            exit 1
          fi

          for RULES in backup_rules data_extraction_rules; do
            RULES_RESOURCE=$(resolve_resource_file "$RULES")
            test -n "$RULES_RESOURCE"
            RULES_DUMP="$RUNNER_TEMP/apk-$RULES.txt"
            "$AAPT2" dump xmltree "$APK" --file "$RULES_RESOURCE" > "$RULES_DUMP"
            grep -Fq 'E: exclude' "$RULES_DUMP"
            grep -Fq 'A: domain' "$RULES_DUMP"
          done

      - name: Resolve release tag and stage artifacts
        id: meta
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$MODE-r${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cp android/app/build/outputs/apk/release/app-release.apk "CareerTuner-$MODE-$TAG.apk"
          (cd dist && zip -qr "../CareerTuner-web-$MODE-$TAG.zip" .)
          ls -la CareerTuner-*

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CareerTuner ${{ steps.mode.outputs.mode }} ${{ steps.meta.outputs.tag }}
          prerelease: true
          files: |
            frontend/CareerTuner-*.apk
            frontend/CareerTuner-web-*.zip
          body: |
            ## CareerTuner ${{ steps.mode.outputs.mode }} 빌드

            | 파일 | 용도 |
            | --- | --- |
            | `CareerTuner-*.apk` | Android 앱 — 폰/BlueStacks 사이드로드 설치 |
            | `CareerTuner-web-*.zip` | 같은 빌드의 웹 번들(정적 호스팅용) |

            **모드 안내**
            - `mock`: 백엔드 불필요 자체 데모 — 아무 이메일/비밀번호로 데모 계정("김데모") 진입.
            - `live`: 실서버(https://careertuner.example.com) 연동 — 실제 계정으로 로그인, 웹과 데이터 공유.
            - 시연 전용 release 키로 서명해 verified App Link를 검증할 수 있지만 Play Store 최종 서명 키는 아닙니다.
              스토어 전환 시 최종 키 지문으로 Repository variable과 assetlinks.json을 함께 교체해야 합니다.

      - name: Remove temporary demo keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/careertuner-demo-release.jks" "$RUNNER_TEMP/assetlinks.json"
