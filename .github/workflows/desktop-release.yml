name: Desktop Release

# desktop-v* 태그를 push 하면 Windows 빌드 → Qt 런타임 묶기 → GitHub Release 자동 생성.
# 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write   # Release 생성에 필요

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      # 러너에 이미 있는 MSVC 컴파일러 + Qt 6.11.1(msvc) 설치
      # qtmultimedia: 음성 녹음(VoiceRecorder)이 Qt Multimedia 를 요구 — 없으면 CMake find_package 실패
      - name: Install Qt 6.11.1
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.11.1'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia
          cache: true

      - name: Configure & build (Release)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      # exe 옆에 Qt DLL·QML 플러그인 복사 (독립 실행 가능하게)
      - name: Deploy Qt runtime
        run: windeployqt --qmldir qml --release --no-translations build/Release/CareerTunerDesktop.exe

      - name: Package zip
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          Compress-Archive -Path build/Release/* -DestinationPath "CareerTunerDesktop-$ver-win64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: "CareerTuner Desktop ${{ github.ref_name }}"
          files: desktop/CareerTunerDesktop-*.zip
          body: |
            CareerTuner 데스크탑 앱 (Windows x64) — 면접 준비 컨트롤 센터.

            압축을 풀고 `CareerTunerDesktop.exe` 를 실행하세요. Qt 설치 불필요.

            **주요 기능**: 세션 리스트 + 대화 스레드(질문·답변·채점·꼬리질문), 음성 답변(녹음→전사→채점),
            면접 리포트 로컬 저장, 폰 디스패치/이어받기, AI 자동 준비, 트레이 알림, 자동 로그인.

            백엔드 기본 주소: 팀 공용 원격(Tailscale). 로컬 시연은 설정 화면에서 `http://localhost:8080` 으로 변경.
            (Tailscale 네트워크에 연결돼 있어야 원격 백엔드에 접속됩니다.)
