name: Demo readiness regression scope

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'desktop/**'
      - 'ml/**'
      - 'scripts/verification/**'
      - 'docs/verification/demo-readiness-checks.json'
      - '.github/scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-readiness-scope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-regression-scope:
    runs-on: [self-hosted, linux, x64, careertuner-ci]
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test regression selector
        run: node --test scripts/verification/select-demo-regression-scope.test.mjs

      - name: Test deployment safety contracts
        run: |
          python3 -m unittest discover -s .github/scripts -p 'test_*.py' -v
          bash -n .github/scripts/*.sh

      - name: Select checks affected by this PR
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/verification/select-demo-regression-scope.mjs \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --strict \
            | tee demo-regression-scope.txt
          {
            echo '## Demo readiness regression scope'
            echo
            cat demo-regression-scope.txt
          } >> "$GITHUB_STEP_SUMMARY"
