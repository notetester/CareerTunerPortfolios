# 4090 Job Trigger (Layer 2 PoC — 수동 dispatch 전용)
#
# ─────────────────────────────────────────────────────────────────────────────
# 이 워크플로는 4090 연결 다중화 Layer 2(방식 A: hosted runner + Tailscale +
# forced-command SSH)의 **초안**이다. 설계 근거는:
#   docs/ops/4090_GITHUB_ACTIONS_TAILSCALE_POC.md
#   docs/ops/4090_CONNECTIVITY_HARDENING_PLAN.md  §5
#
# ⚠ 중요(엄수):
#   - **수동 dispatch 전용.** push/schedule 등 자동 트리거 없음.
#   - **secret 미설정 시 동작 안 함.** 필수 secret 이 비면 가드 step 이 즉시 실패한다.
#   - 워크플로에 **실제 secret 값/ private key 가 없다.** 전부 ${{ secrets.XXX }} 참조.
#   - 4090 에 **임의 셸 명령을 보내지 않는다.** 검증된 jobId 만 전달하고,
#     실제 실행은 4090 의 forced-command wrapper(run_careertuner_job.ps1)가 결정한다.
#   - job 큐 source-of-truth = CareerTunerAI repo 의 jobs/open. 결과 push 도 CareerTunerAI.
# ─────────────────────────────────────────────────────────────────────────────

name: 4090 Job Trigger (Layer 2 PoC)

# 수동 dispatch 전용 — 자동 트리거(push/schedule/pull_request) 비활성.
on:
  workflow_dispatch:
    inputs:
      jobId:
        description: '실행할 jobId (형식: YYYY-MM-DD-slug, 예: 2026-06-26-rag-r2)'
        required: true
        type: string

# 최소 권한.
permissions:
  contents: read

# 동시 실행 방지(4090 에서 job 중복 실행 막기).
concurrency:
  group: 4090-job-trigger
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      # ── 0) 메인 repo 체크아웃(워크플로 자체 참조용; 결과/큐는 CareerTunerAI) ──
      - name: Checkout
        uses: actions/checkout@v6

      # ── 1) 필수 secret 미설정 가드 — 비어 있으면 즉시 실패(부분 실행 방지) ──
      - name: Verify required secrets are configured
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          TRIGGER_SSH_PRIVATE_KEY: ${{ secrets.TRIGGER_SSH_PRIVATE_KEY }}
          H4090_HOST: ${{ secrets.H4090_HOST }}
          H4090_SSH_USER: ${{ secrets.H4090_SSH_USER }}
          H4090_KNOWN_HOSTS: ${{ secrets.H4090_KNOWN_HOSTS }}
        run: |
          missing=""
          [ -z "${TAILSCALE_AUTHKEY}" ]       && missing="${missing} TAILSCALE_AUTHKEY"
          [ -z "${TRIGGER_SSH_PRIVATE_KEY}" ] && missing="${missing} TRIGGER_SSH_PRIVATE_KEY"
          [ -z "${H4090_HOST}" ]              && missing="${missing} H4090_HOST"
          [ -z "${H4090_SSH_USER}" ]          && missing="${missing} H4090_SSH_USER"
          [ -z "${H4090_KNOWN_HOSTS}" ]       && missing="${missing} H4090_KNOWN_HOSTS"
          if [ -n "${missing}" ]; then
            echo "::error::필수 secret 미설정 →${missing}"
            echo "이 워크플로는 secret 이 모두 설정돼야 동작한다(설계: docs/ops/4090_GITHUB_ACTIONS_TAILSCALE_POC.md §5)."
            exit 1
          fi
          echo "필수 secret 모두 설정됨(값은 출력하지 않음)."

      # ── 2) jobId 정규식 검증(allowlist) — 임의 입력/셸 주입 차단 ──
      #     허용 형식만 통과: 날짜(YYYY-MM-DD) + 소문자/숫자/하이픈 slug.
      - name: Validate jobId
        env:
          JOB_ID: ${{ inputs.jobId }}
        run: |
          if ! printf '%s' "${JOB_ID}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9-]+$'; then
            echo "::error::허용되지 않는 jobId 형식: '${JOB_ID}' (요구: ^[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9-]+$)"
            exit 1
          fi
          echo "jobId 형식 검증 통과: ${JOB_ID}"

      # ── 3) tailnet 임시 합류(ephemeral, tagged) — 작업 종료 시 노드 자동 삭제 ──
      - name: Join tailnet (Tailscale)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # ephemeral·tagged auth key 권장(설계 §5). 태그는 tailnet ACL 에 맞춘다.
          tags: tag:ci-4090

      # ── 4) trigger SSH private key 설치(secret → 파일, 600) + known_hosts pinning ──
      #     private key 본문은 secret 에만 존재(repo 미커밋). 값은 로그에 출력하지 않는다.
      - name: Install SSH key and pin known_hosts
        env:
          TRIGGER_SSH_PRIVATE_KEY: ${{ secrets.TRIGGER_SSH_PRIVATE_KEY }}
          H4090_KNOWN_HOSTS: ${{ secrets.H4090_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${TRIGGER_SSH_PRIVATE_KEY}" > ~/.ssh/trigger_4090
          chmod 600 ~/.ssh/trigger_4090
          # 호스트키 pinning — StrictHostKeyChecking 으로 MITM 차단(secret 의 ssh-keyscan 결과).
          printf '%s\n' "${H4090_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "SSH key·known_hosts 설치 완료(값 미출력)."

      # ── 5) forced-command SSH 트리거 — 4090 wrapper 에 jobId 만 전달 ──
      #     trigger 키는 4090 에서 command="...run_careertuner_job.ps1",no-pty 로 묶여 있어,
      #     워크플로는 임의 명령을 못 보낸다. 아래 'run' 인자는 wrapper 가 해석할 jobId 뿐이다.
      #     StrictHostKeyChecking=yes 로 known_hosts pinning 강제(미일치 시 연결 거부).
      - name: Trigger 4090 job via forced-command SSH
        env:
          H4090_HOST: ${{ secrets.H4090_HOST }}
          H4090_SSH_USER: ${{ secrets.H4090_SSH_USER }}
          JOB_ID: ${{ inputs.jobId }}
        run: |
          set +e
          ssh -i ~/.ssh/trigger_4090 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              "${H4090_SSH_USER}@${H4090_HOST}" \
              "run ${JOB_ID}"
          code=$?
          set -e
          echo "4090 trigger exit code: ${code}"
          if [ "${code}" -ne 0 ]; then
            echo "::error::4090 job trigger 실패(exit ${code}). 분류: sshd/tailscale/auth/acl/wrapper/repo (설계 §4·하드닝 §1)."
            exit "${code}"
          fi
          echo "4090 job 트리거 성공: ${JOB_ID} (결과는 CareerTunerAI 에 push 됨)."
