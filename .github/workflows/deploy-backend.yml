name: Deploy backend to EC2

# dev 에 백엔드/워커/compose 변경이 push 되면:
#   ① 변경된 서비스 이미지만 병렬로 빌드해 GHCR 에 push
#   ② EC2 에 compose 파일을 전송하고 pull & up (무중단 아님 — 재기동 수 초)
#
# ⚠️ 인프라(공통 영역) 산출물 — dev 반영 전 팀 합의 필요.
# 배포 secret(EC2_HOST/EC2_USER/EC2_SSH_KEY) 미설정이면 이미지 빌드까지만 유효하고
# deploy job 은 가드에서 즉시 실패한다(EC2 준비 전에도 이미지 빌드는 검증됨).

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - 'ml/job-posting-worker/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      correction_preflight_only:
        description: 'EC2에서 E 첨삭 Ollama 접근 확인 후 .env만 갱신하고 배포는 생략'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write   # GHCR push

concurrency:
  group: careertuner-ec2-deploy
  cancel-in-progress: false   # 배포는 중간에 끊지 않는다

env:
  BACKEND_IMAGE: ghcr.io/notetester/careertuner-backend
  WORKER_IMAGE: ghcr.io/notetester/careertuner-job-posting-worker
  CORRECTION_AI_PROVIDER: self
  CORRECTION_AI_BASE_URL: http://localhost:11434/v1
  CORRECTION_AI_MODEL: careertuner-e-correction-3b:delivery-s-f16-20260708
  CORRECTION_AI_PREFLIGHT_REQUIRED: 'false'

jobs:
  correction-ollama-preflight:
    if: github.event_name == 'workflow_dispatch' && inputs.correction_preflight_only == true
    runs-on: [self-hosted, linux, x64, careertuner-trusted]
    steps:
      - name: Verify deploy secrets are configured
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=""
          [ -z "$EC2_HOST" ]    && missing="$missing EC2_HOST"
          [ -z "$EC2_USER" ]    && missing="$missing EC2_USER"
          [ -z "$EC2_SSH_KEY" ] && missing="$missing EC2_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::배포 secret 미설정 ->$missing"
            exit 1
          fi

      - name: Verify E correction Ollama and update EC2 env
        uses: appleboy/ssh-action@v1.2.5
        env:
          CT_CORRECTION_PROVIDER: ${{ env.CORRECTION_AI_PROVIDER }}
          CT_CORRECTION_BASE_URL: ${{ env.CORRECTION_AI_BASE_URL }}
          CT_CORRECTION_MODEL: ${{ env.CORRECTION_AI_MODEL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: CT_CORRECTION_PROVIDER,CT_CORRECTION_BASE_URL,CT_CORRECTION_MODEL
          script: |
            set -eu
            cd ~/careertuner
            test -f .env

            ollama_api_base="${CT_CORRECTION_BASE_URL%/v1}"
            check_ollama() {
              for i in 1 2 3; do
                if curl -fsS --connect-timeout 5 --max-time 15 "$ollama_api_base/api/version" >/dev/null \
                  && tags="$(curl -fsS --connect-timeout 5 --max-time 20 "$ollama_api_base/api/tags")" \
                  && printf '%s' "$tags" | grep -Fq "$CT_CORRECTION_MODEL"; then
                  return 0
                fi
                echo "::warning::E correction Ollama preflight retry ${i}/3 failed"
                sleep 5
              done
              return 1
            }
            check_ollama

            backup=".env.bak.$(date +%Y%m%d%H%M%S)"
            cp .env "$backup"
            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }
            upsert_env CAREERTUNER_CORRECTION_AI_PROVIDER "$CT_CORRECTION_PROVIDER"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_BASE_URL "$CT_CORRECTION_BASE_URL"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_MODEL "$CT_CORRECTION_MODEL"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_TEMPERATURE "0.0"

            echo "E correction Ollama preflight OK"
            echo "EC2 env backup: $backup"
            grep -E '^CAREERTUNER_CORRECTION_AI_(PROVIDER|SELF_BASE_URL|SELF_MODEL|SELF_TEMPERATURE)=' .env | cut -d= -f1

  detect-changes:
    if: github.event_name != 'workflow_dispatch' || inputs.correction_preflight_only != true
    runs-on: [self-hosted, linux, x64, careertuner-trusted]
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      worker: ${{ steps.changes.outputs.worker }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            backend=true
            worker=true
          else
            base="$BEFORE_SHA"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-parse "${GITHUB_SHA}^")"
            fi

            git diff --name-only "$base" "$GITHUB_SHA" | tee changed-files.txt

            backend=false
            worker=false
            if grep -Eq '^(backend/|\.github/workflows/deploy-backend\.yml$)' changed-files.txt; then
              backend=true
            fi
            if grep -Eq '^(ml/job-posting-worker/|\.github/workflows/deploy-backend\.yml$)' changed-files.txt; then
              worker=true
            fi
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "worker=$worker" >> "$GITHUB_OUTPUT"
          echo "backend image build: $backend"
          echo "worker image build: $worker"

      - name: Compute short SHA
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: [self-hosted, linux, x64, careertuner-trusted]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build & push backend
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker buildx build \
            --push \
            --tag "${BACKEND_IMAGE}:latest" \
            --tag "${BACKEND_IMAGE}:sha-${{ needs.detect-changes.outputs.short_sha }}" \
            ./backend

  build-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: [self-hosted, linux, x64, careertuner-trusted]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build & push job-posting-worker
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker buildx build \
            --push \
            --build-arg PYTHON_VERSION=3.12 \
            --build-arg INSTALL_OCR=true \
            --tag "${WORKER_IMAGE}:latest" \
            --tag "${WORKER_IMAGE}:sha-${{ needs.detect-changes.outputs.short_sha }}" \
            ./ml/job-posting-worker

  deploy:
    needs: [detect-changes, build-backend, build-worker]
    if: >-
      ${{
        always()
        && needs.detect-changes.result == 'success'
        && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
        && (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped')
      }}
    runs-on: [self-hosted, linux, x64, careertuner-trusted]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify deploy secrets are configured
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=""
          [ -z "$EC2_HOST" ]    && missing="$missing EC2_HOST"
          [ -z "$EC2_USER" ]    && missing="$missing EC2_USER"
          [ -z "$EC2_SSH_KEY" ] && missing="$missing EC2_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::배포 secret 미설정 →$missing (EC2 준비 후 GitHub Settings > Secrets 에 등록)"
            exit 1
          fi
          echo "배포 secret 확인됨(값 미출력)."

      - name: Prepare managed database patches
        shell: bash
        env:
          # 자동 마이그레이션 도입 직전 dev. 이 커밋 뒤에 새로 추가된 patch만 원장으로 관리한다.
          DB_AUTOMATION_BASELINE: 95edad0c2e62aab2b9700b32e43724eef35876cf
        run: |
          set -euo pipefail
          git cat-file -e "${DB_AUTOMATION_BASELINE}^{commit}"
          if ! git merge-base --is-ancestor "$DB_AUTOMATION_BASELINE" "$GITHUB_SHA"; then
            echo "::error::DB 자동화 기준 커밋이 현재 배포 커밋의 조상이 아닙니다."
            exit 1
          fi
          modified_patches="$(git diff --diff-filter=M --name-only \
            "$DB_AUTOMATION_BASELINE" "$GITHUB_SHA" -- \
            'backend/src/main/resources/db/patches/*.sql')"
          if [ -n "$modified_patches" ]; then
            echo "::error::기존 DB patch는 수정할 수 없습니다. 새 patch 파일을 추가하세요."
            printf '%s\n' "$modified_patches"
            exit 1
          fi
          git diff --diff-filter=A --name-only \
            "$DB_AUTOMATION_BASELINE" "$GITHUB_SHA" -- \
            'backend/src/main/resources/db/patches/*.sql' \
            | sort -u > managed-db-patches.txt
          echo "Managed DB patches:"
          sed 's/^/- /' managed-db-patches.txt

      - name: Copy deploy files and database patches to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,managed-db-patches.txt,backend/src/main/resources/db/patches,.github/scripts/apply-db-patches.sh"
          target: "~/careertuner"

      - name: Verify E correction Ollama and update EC2 env
        uses: appleboy/ssh-action@v1.2.5
        env:
          CT_CORRECTION_PROVIDER: ${{ env.CORRECTION_AI_PROVIDER }}
          CT_CORRECTION_BASE_URL: ${{ env.CORRECTION_AI_BASE_URL }}
          CT_CORRECTION_MODEL: ${{ env.CORRECTION_AI_MODEL }}
          CT_CORRECTION_PREFLIGHT_REQUIRED: ${{ env.CORRECTION_AI_PREFLIGHT_REQUIRED }}
          CT_CERT_DATA_GO_KR_KEY: ${{ secrets.CAREERTUNER_CERT_DATA_GO_KR_SERVICE_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: CT_CORRECTION_PROVIDER,CT_CORRECTION_BASE_URL,CT_CORRECTION_MODEL,CT_CORRECTION_PREFLIGHT_REQUIRED,CT_CERT_DATA_GO_KR_KEY
          script: |
            set -eu
            cd ~/careertuner
            test -f .env

            ollama_api_base="${CT_CORRECTION_BASE_URL%/v1}"
            check_ollama() {
              for i in 1 2 3; do
                if curl -fsS --connect-timeout 5 --max-time 15 "$ollama_api_base/api/version" >/dev/null \
                  && tags="$(curl -fsS --connect-timeout 5 --max-time 20 "$ollama_api_base/api/tags")" \
                  && printf '%s' "$tags" | grep -Fq "$CT_CORRECTION_MODEL"; then
                  return 0
                fi
                echo "::warning::E correction Ollama preflight retry ${i}/3 failed"
                sleep 5
              done
              return 1
            }

            backup=".env.bak.$(date +%Y%m%d%H%M%S)"
            cp .env "$backup"
            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }
            upsert_env CAREERTUNER_CORRECTION_AI_PROVIDER "$CT_CORRECTION_PROVIDER"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_BASE_URL "$CT_CORRECTION_BASE_URL"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_MODEL "$CT_CORRECTION_MODEL"
            upsert_env CAREERTUNER_CORRECTION_AI_SELF_TEMPERATURE "0.0"
            # C 자격증 근거 라이브 조회 키(공공데이터포털, 디코딩 raw — repo secret). 미설정이면 기존 값 유지
            # (빈 값 덮어쓰기 금지 — 키 없어도 앱은 안전 degrade). compose prod 가 .env 전체를 컨테이너에 주입한다.
            if [ -n "${CT_CERT_DATA_GO_KR_KEY:-}" ]; then
              upsert_env CAREERTUNER_CERT_DATA_GO_KR_SERVICE_KEY "$CT_CERT_DATA_GO_KR_KEY"
              echo "C cert data.go.kr service key updated"
            fi
            echo "EC2 env backup: $backup"
            echo "E correction env updated"

            if check_ollama; then
              echo "E correction Ollama deploy preflight OK"
            elif [ "$CT_CORRECTION_PREFLIGHT_REQUIRED" = "true" ]; then
              echo "::error::E correction Ollama preflight failed and is required"
              exit 1
            else
              echo "::warning::E correction Ollama is currently unreachable; backend deploy will continue with updated env"
            fi

      - name: Pull & up on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/careertuner
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env"
            bash .github/scripts/apply-db-patches.sh managed-db-patches.txt
            $COMPOSE pull
            $COMPOSE up -d --remove-orphans
            docker image prune -f
            # 부팅 대기 후 헬스체크 — 실패해도 자동 롤백은 안 한다(포트폴리오 규모, 로그로 원인 확인)
            for i in $(seq 1 12); do
              if curl -fsS http://localhost:8080/api/health >/dev/null; then
                echo "health OK"; exit 0
              fi
              echo "health 대기 ${i}/12..."; sleep 5
            done
            echo "::warning::헬스체크 미응답(60s) — 컨테이너 로그 확인 필요"
