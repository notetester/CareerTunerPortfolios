# Full-context tests share one small pool instead of holding multiple default-sized pools
# against the team database for the entire Spring test-context cache lifetime.
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0

# Tests must not probe external AI endpoints or start background DB polling.
ai.ollama.fallback-enabled=false
careertuner.extraction.worker.enabled=false

# Keep test reports compact while retaining lifecycle and failure diagnostics.
logging.level.com.careertuner=INFO
logging.level.dev.langchain4j=INFO
