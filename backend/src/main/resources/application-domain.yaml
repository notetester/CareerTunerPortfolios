# ─────────────────────────────────────────────────────────────────────────────
#  domain 프로파일 — 도메인 네임 기반 운영(HTTPS). 도메인은 아직 미확정 플레이스홀더.
#
#  실행(운영 서버):
#    SPRING_PROFILES_ACTIVE=domain java -jar app.jar
#
#  DB 는 base(application.yaml) 기본값(localhost/team1_db)을 그대로 쓴다.
#  도메인 확정 시 아래 플레이스홀더(careertuner.kr 예시)만 env 또는 이 값으로 교체한다.
#  프로파일 전체 목록·컴포넌트별 전환 방법: docs/ENVIRONMENTS.md, config/environments.json
# ─────────────────────────────────────────────────────────────────────────────

careertuner:
  app:
    # 도메인 확정 전 플레이스홀더 — 예: https://careertuner.kr / https://api.careertuner.kr
    frontend-url: ${APP_FRONTEND_URL:https://careertuner.kr}
    sites-frontend-url: ${APP_SITES_FRONTEND_URL:}
    api-base-url: ${APP_API_BASE_URL:https://api.careertuner.kr}
  oauth:
    mock-enabled: ${OAUTH_MOCK_ENABLED:false}

# Ollama 는 공유 4090(Tailscale) 을 사용한다 — 운영 서버가 tailnet 에 조인되어 있어야 한다.
# 4090 이 꺼져 있으면 부팅 시 fallback-base-urls(기본 로컬 Ollama)로 자동 폴백한다.
ai:
  ollama:
    base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    fallback-base-urls: ${AI_OLLAMA_FALLBACK_BASE_URLS:http://localhost:11434}

langchain4j:
  ollama:
    chat-model:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}

# OAuth redirect-uri 도 도메인 확정 후 함께 교체한다(위 careertuner 블록에 병합할 예시).
#   oauth:
#     kakao:
#       redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:https://api.careertuner.kr/api/auth/oauth/kakao/callback}
