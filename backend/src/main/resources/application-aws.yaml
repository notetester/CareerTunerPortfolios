# ─────────────────────────────────────────────────────────────────────────────
#  aws 프로파일 — AWS 서버 배포(팀 DB + 공인 IP/도메인 미확정 플레이스홀더).
#
#  실행(배포 서버):
#    SPRING_PROFILES_ACTIVE=aws java -jar app.jar
#
#  DB 는 base(application.yaml) 기본값(localhost/team1_db)을 그대로 쓴다.
#  아래 CHANGEME 플레이스홀더는 공인 주소 확정 시 env(APP_FRONTEND_URL 등)로 주입하거나 이 값만 교체한다.
#  프로파일 전체 목록·컴포넌트별 전환 방법: docs/ENVIRONMENTS.md, config/environments.json
# ─────────────────────────────────────────────────────────────────────────────

careertuner:
  app:
    # 배포된 프런트/백엔드 공인 주소 — 미확정(CHANGEME). OAuth 콜백·이메일 링크 조립에 사용된다.
    frontend-url: ${APP_FRONTEND_URL:http://CHANGEME-aws-frontend:5173}
    api-base-url: ${APP_API_BASE_URL:http://CHANGEME-aws-api:8080}
  oauth:
    mock-enabled: ${OAUTH_MOCK_ENABLED:false}

# Ollama 는 공유 4090(Tailscale) 을 사용한다 — AWS 서버가 tailnet 에 조인되어 있어야 한다.
# 4090 이 꺼져 있으면 부팅 시 fallback-base-urls(기본 로컬 Ollama)로 자동 폴백한다.
ai:
  ollama:
    base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    fallback-base-urls: ${AI_OLLAMA_FALLBACK_BASE_URLS:http://localhost:11434}

langchain4j:
  ollama:
    chat-model:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}

# OAuth redirect-uri 도 공인 주소 확정 후 함께 교체한다(위 careertuner 블록에 병합할 예시).
#   oauth:
#     kakao:
#       redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:http://CHANGEME-aws-api:8080/api/auth/oauth/kakao/callback}
