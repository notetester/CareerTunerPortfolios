# ─────────────────────────────────────────────────────────────────────────────
#  aws 프로파일 — AWS 서버 배포(팀 DB + careertuner.kro.kr 통합 도메인).
#
#  실행(배포 서버):
#    SPRING_PROFILES_ACTIVE=aws java -jar app.jar
#
#  DB 는 base(application.yaml) 기본값(localhost/team1_db)을 그대로 쓴다.
#  주소를 별도 환경으로 바꿀 때는 env(APP_FRONTEND_URL 등)로 오버라이드한다.
#  프로파일 전체 목록·컴포넌트별 전환 방법: docs/ENVIRONMENTS.md, config/environments.json
# ─────────────────────────────────────────────────────────────────────────────

careertuner:
  app:
    # nginx가 웹과 /api를 같은 HTTPS 도메인에서 제공한다. OAuth 콜백·이메일 링크 조립에 사용된다.
    frontend-url: ${APP_FRONTEND_URL:https://careertuner.kro.kr}
    sites-frontend-url: ${APP_SITES_FRONTEND_URL:https://careertuner.careertuner.chatgpt.site}
    api-base-url: ${APP_API_BASE_URL:https://careertuner.kro.kr}
  oauth:
    mock-enabled: ${OAUTH_MOCK_ENABLED:false}
    google:
      redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:https://careertuner.kro.kr/api/auth/oauth/google/callback}
    kakao:
      redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:https://careertuner.kro.kr/api/auth/oauth/kakao/callback}
    naver:
      redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:https://careertuner.kro.kr/api/auth/oauth/naver/callback}
  toss:
    payments:
      # 결제 승인 후 브라우저가 개발용 localhost로 이탈하지 않도록 운영 반환 주소를 고정한다.
      success-url: ${CAREERTUNER_TOSS_PAYMENTS_SUCCESS_URL:https://careertuner.kro.kr/billing/success}
      fail-url: ${CAREERTUNER_TOSS_PAYMENTS_FAIL_URL:https://careertuner.kro.kr/billing/fail}

# ─── 자체 LLM 엔드포인트 (2대: F 노트북 + 공유 4090) ──────────────────────────
# careertuner.kro.kr(AWS) 배포용. AWS 서버가 tailnet 에 조인돼 있어야 아래 Tailscale
# 주소에 닿는다. 자체모델이 꺼졌거나 안 닿으면 각 도메인이 런타임에 외부(Claude→OpenAI
# →Mock/self-rules)로 자동 강등하므로 시연은 끊기지 않는다(폴백은 앱 코드에 이미 구현됨).
# raw IP 는 노드 바뀌면 깨지니 MagicDNS 권장: http://<host>.<tailnet>.ts.net:11434
#
#  [A] F 노트북 (F 담당) — 검열·FAQ(gemma4) + 커뮤니티/인테이크 챗봇(qwen3:8b).
#      AI_OLLAMA_BASE_URL 하나가 ai.ollama + langchain4j 를 모두 덮는다(전부 F 노트북).
#  [B] 공유 4090 (C 취업분석 · D 면접평가 · B 공고분석) — 각 도메인 전용 env:
#      CAREERTUNER_ANALYSIS_AI_OSS_BASE_URL / INTERVIEW_EVAL_BASE_URL / B_ANALYSIS_OLLAMA_BASE_URL
#      (+ 켜기: CAREERTUNER_ANALYSIS_AI_PROVIDER=oss, INTERVIEW_EVAL_PROVIDER=oss)

# [A] F 노트북. 미설정 시 localhost(=배포에선 provider 폴백 Claude 가 실질 안전망).
ai:
  ollama:
    base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    fallback-base-urls: ${AI_OLLAMA_FALLBACK_BASE_URLS:http://localhost:11434}
    # 노트북 꺼짐 → 짧게 연결 실패시켜 provider 폴백(Claude)으로 빨리 넘긴다.
    connect-timeout: ${AI_OLLAMA_CONNECT_TIMEOUT:5s}

langchain4j:
  ollama:
    chat-model:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
      # (신규) 무제한 방지 — 노트북이 연결은 받고 멈추면 이 시간 후 Claude 로 폴백한다.
      timeout: ${CHAT_LLM_OLLAMA_TIMEOUT:60s}
