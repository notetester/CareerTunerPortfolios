spring:
  application:
    name: CareerTuner

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:12MB}

  # ───────────────────────────────────────────────────────────────────────
  #  시크릿/환경 설정 정책
  #  - 모든 민감값은 ${ENV_VAR:기본값} 형태로 둔다.
  #  - 지금: 커밋된 기본값(개발용)으로 즉시 동작 → 비공개 repo 라 팀원이 클론 후 바로 실행.
  #  - 배포(AWS 등): 동일 이름의 환경변수만 설정하면 코드/파일 변경 없이 교체된다.
  #      예)  DB_PASSWORD=... OAUTH_KAKAO_CLIENT_SECRET=... JWT_SECRET=... java -jar app.jar
  # ───────────────────────────────────────────────────────────────────────

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:team1_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:dbuser}
    password: ${DB_PASSWORD:YOUR_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # MySQL 미기동 상태에서도 부팅되도록 시작 시 커넥션 시도를 생략(개발 편의).
      initialization-fail-timeout: -1

  mail:
    host: ${MAIL_HOST:smtp.naver.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: ${MAIL_HOST:smtp.naver.com}
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

server:
  port: 8080

# MyBatis — 본 프로젝트의 표준 영속성 계층(JPA 미사용).
mybatis:
  type-aliases-package: com.careertuner
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ─── CareerTuner 애플리케이션 설정 (모두 env 로 override 가능) ───
careertuner:
  app:
    # 소셜 로그인 완료/이메일 링크가 향하는 프런트엔드 주소
    frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
    # OAuth redirect-uri·이메일 링크 조립에 쓰는 백엔드 주소
    api-base-url: ${APP_API_BASE_URL:http://localhost:8080}
  jwt:
    # 운영에서는 반드시 JWT_SECRET 환경변수로 교체할 것(32바이트 이상 권장).
    secret: ${JWT_SECRET:dev-only-careertuner-secret-please-change-in-production-0123456789abcdef}
    access-token-validity-seconds: ${JWT_ACCESS_TTL:1800}        # 30분
    refresh-token-validity-seconds: ${JWT_REFRESH_TTL:1209600}   # 14일
  mail:
    from: ${MAIL_FROM:no-reply@careertuner.local}
    sender-name: ${MAIL_SENDER_NAME:CareerTuner}
    # SMTP(username) 미설정 시 실제 발송 대신 인증 링크를 로그로 출력하는 개발 모드.
    dev-mode: ${MAIL_DEV_MODE:true}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout: ${OPENAI_TIMEOUT:90s}
  toss:
    payments:
      secret-key: ${TOSS_SECRET_KEY:}
      confirm-url: ${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}
      success-url: ${TOSS_SUCCESS_URL:http://localhost:5173/billing/success}
      fail-url: ${TOSS_FAIL_URL:http://localhost:5173/billing/fail}
      timeout: ${TOSS_TIMEOUT:10s}
  uploads:
    job-posting-dir: ${JOB_POSTING_UPLOAD_DIR:.uploads/application-postings}
    max-file-size-bytes: ${JOB_POSTING_MAX_FILE_SIZE_BYTES:10485760}
  file:
    # 면접 음성/영상 등 업로드 파일 저장 위치. 큰 영상은 SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE 도 함께 올린다.
    media-dir: ${MEDIA_UPLOAD_DIR:.uploads/media}
    max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE_BYTES:10485760}
  interview:
    realtime:
      # 실시간 음성 면접관(OpenAI Realtime). 키는 careertuner.openai.api-key 재사용.
      # 실제 사용 가능한 Realtime 모델 id 로 교체할 것.
      model: ${INTERVIEW_REALTIME_MODEL:gpt-4o-realtime-preview}
      voice: ${INTERVIEW_REALTIME_VOICE:alloy}
    rag:
      # 면접 RAG(Qdrant). 기본 비활성 — Qdrant 띄우고 enabled=true 로 켜면 평가에 근거 주입.
      enabled: ${INTERVIEW_RAG_ENABLED:false}
      qdrant-url: ${QDRANT_URL:http://localhost:6333}
      collection: ${INTERVIEW_RAG_COLLECTION:interview_knowledge}
      embedding-model: ${INTERVIEW_RAG_EMBEDDING_MODEL:text-embedding-3-small}
      dimension: ${INTERVIEW_RAG_DIMENSION:1536}
      top-k: ${INTERVIEW_RAG_TOPK:4}
  oauth:
    # ⚠️ 아직 키 미발급 → 기본값은 placeholder. 키 수령 후 env 또는 이 값만 교체.
    kakao:
      client-id: ${OAUTH_KAKAO_CLIENT_ID:CHANGEME}
      client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/oauth/kakao/callback}
    naver:
      client-id: ${OAUTH_NAVER_CLIENT_ID:CHANGEME}
      client-secret: ${OAUTH_NAVER_CLIENT_SECRET:CHANGEME}
      redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:http://localhost:8080/api/auth/oauth/naver/callback}
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:CHANGEME}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:CHANGEME}
      redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}

logging:
  level:
    com.careertuner: DEBUG
